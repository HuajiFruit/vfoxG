name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  VFOX_VERSION: "1.0.11"

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.0'
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install NSIS
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Download vfox core binaries
        shell: powershell
        run: |
          $base = "https://github.com/version-fox/vfox/releases/download/v${{ env.VFOX_VERSION }}"
          function Install-VfoxCore($url, $archive, $extractDir, $targetDir) {
            Invoke-WebRequest $url -OutFile $archive
            Expand-Archive $archive -DestinationPath $extractDir -Force
            $vfoxExe = Get-ChildItem $extractDir -Recurse -File -Filter vfox.exe | Select-Object -First 1
            if (-not $vfoxExe) {
              throw "vfox.exe was not found in $archive"
            }
            New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
            Copy-Item (Join-Path $vfoxExe.DirectoryName '*') $targetDir -Recurse -Force
          }
          Install-VfoxCore "$base/vfox_${{ env.VFOX_VERSION }}_windows_x86_64.zip" vfox_amd64.zip _tmp_amd64 core\windows\x86_64
          Install-VfoxCore "$base/vfox_${{ env.VFOX_VERSION }}_windows_i386.zip" vfox_386.zip _tmp_386 core\windows\x86

      - name: Prepare staging directory
        run: New-Item -ItemType Directory -Force -Path release_staging
        shell: powershell
        
      - name: Build Windows AMD64 Installer
        shell: powershell
        run: |
          wails build -platform windows/amd64 -nsis -clean
          Copy-Item build\bin\vfoxG-amd64-installer.exe release_staging\vfoxG-windows-amd64-installer.exe -Force
        
      - name: Build Windows 386 Installer
        shell: powershell
        run: |
          wails build -platform windows/386 -clean
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DARG_WAILS_AMD64_BINARY=..\..\bin\vfoxG.exe build\windows\installer\project_386.nsi
          Copy-Item build\bin\vfoxG-386-installer.exe release_staging\vfoxG-windows-386-installer.exe -Force
          
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release_staging/*

  build-linux-amd64:
    name: Build Linux AMD64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.0'
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config
        
      - name: Install Tools
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Download vfox core binary
        run: |
          mkdir -p core/linux/x86_64 /tmp/vfox_extract
          curl -L "https://github.com/version-fox/vfox/releases/download/v${{ env.VFOX_VERSION }}/vfox_${{ env.VFOX_VERSION }}_linux_x86_64.tar.gz" | tar xz -C /tmp/vfox_extract
          vfox_bin="$(find /tmp/vfox_extract -type f -name vfox -print -quit)"
          test -n "$vfox_bin"
          cp -R "$(dirname "$vfox_bin")"/. core/linux/x86_64/
          
      - name: Build and Package
        shell: bash
        run: |
          wails build -platform linux/amd64 -clean
          cp build/bin/vfoxG build/bin/vfoxG-linux-amd64
          mkdir -p build/portable/vfoxG-linux-amd64/core/linux
          cp build/bin/vfoxG build/portable/vfoxG-linux-amd64/vfoxG
          chmod +x build/portable/vfoxG-linux-amd64/vfoxG
          cp -r core/linux/x86_64 build/portable/vfoxG-linux-amd64/core/linux/
          tar -czf build/bin/vfoxG-linux-amd64-portable.tar.gz -C build/portable vfoxG-linux-amd64
          sed -e 's/\${NFPM_ARCH}/amd64/g' -e 's/\${NFPM_CORE_ARCH}/x86_64/g' nfpm.yaml.tmpl > nfpm.yaml
          nfpm pkg --packager deb --target build/bin/
          nfpm pkg --packager rpm --target build/bin/
          
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/bin/vfoxG-linux-amd64-portable.tar.gz
            build/bin/*.deb
            build/bin/*.rpm

  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.0'
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install Tools
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          brew install create-dmg

      - name: Download vfox core binary
        run: |
          mkdir -p core/macos/arm64 /tmp/vfox_extract_arm64
          curl -L "https://github.com/version-fox/vfox/releases/download/v${{ env.VFOX_VERSION }}/vfox_${{ env.VFOX_VERSION }}_macos_aarch64.tar.gz" | tar xz -C /tmp/vfox_extract_arm64
          vfox_bin="$(find /tmp/vfox_extract_arm64 -type f -name vfox -print -quit)"
          test -n "$vfox_bin"
          cp -R "$(dirname "$vfox_bin")"/. core/macos/arm64/
          
      - name: Build and Package
        run: |
          wails build -platform darwin/arm64 -clean
          # Copy core into .app bundle so getCoreDir() finds it at runtime
          mkdir -p build/bin/vfoxG.app/Contents/Resources/core/macos/arm64
          cp -r core/macos/arm64/* build/bin/vfoxG.app/Contents/Resources/core/macos/arm64/
          create-dmg \
            --volname "vfoxG Installer" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "vfoxG.app" 200 190 \
            --hide-extension "vfoxG.app" \
            --app-drop-link 600 185 \
            "build/bin/vfoxG-macos-arm64.dmg" \
            "build/bin/vfoxG.app"
            
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/vfoxG-macos-arm64.dmg
